<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Social Final Test</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; background: #020617; color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* 🔐 Login Screen */
        #login-screen { position: fixed; inset: 0; background: #020617; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .login-box { background: #0f172a; padding: 40px; border-radius: 20px; border: 1px solid #00d2ff; width: 90%; max-width: 350px; }
        .google-btn { background: white; color: #444; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* 📱 Main UI */
        header { background: #0f172a; padding: 15px; border-bottom: 2px solid #00d2ff; display: flex; justify-content: space-between; align-items: center; }
        #chat-wall { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(to bottom, #020617, #0f172a); }
        
        /* 💬 Messages */
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #005c4b; color: white; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #202c33; color: white; border-bottom-left-radius: 2px; }
        .u-tag { font-size: 0.7rem; color: #00d2ff; font-weight: bold; margin-bottom: 3px; display: block; }

        /* ⌨️ Controls */
        .footer { background: #0f172a; padding: 12px; border-top: 1px solid #334155; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        #msgInp { flex: 1; background: #1e293b; border: none; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 1rem; }
        #sendBtn { background: #00d2ff; color: #020617; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: transform 0.2s; }
        #sendBtn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="color:#00d2ff; margin:0;">G-SOCIAL</h1>
            <p style="opacity: 0.8;">Connect & Chat Instantly</p>
            <button class="google-btn" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Sign in with Google
            </button>
        </div>
    </div>

    <header id="app-header" style="display:none;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="uImg" style="width:30px; height:30px; background:#00d2ff; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#020617; font-weight:bold; font-size:12px;">?</div>
            <span id="uName" style="font-weight: 500;">User</span>
        </div>
        <button onclick="logout()" style="background:rgba(255,77,77,0.1); border:1px solid #ff4d4d; color:#ff4d4d; padding:5px 12px; border-radius:8px; font-size: 11px; cursor:pointer;">LOGOUT</button>
    </header>

    <div id="chat-wall"></div>

    <div id="app-footer" class="footer" style="display:none;">
        <div class="input-row">
            <input type="text" id="msgInp" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 🔥 Your Firebase Config from Screenshot
        const firebaseConfig = { 
            apiKey: "AIzaSyB5fR75bSzUC431tGZb6NCm2frB7d-u290", 
            authDomain: "g-social-7319d.firebaseapp.com",
            databaseURL: "https://g-social-7319d-default-rtdb.firebaseio.com",
            projectId: "g-social-7319d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        let me = null;

        // --- Auth System ---
        window.loginWithGoogle = () => {
            signInWithPopup(auth, provider).catch(e => alert("Login Error: " + e.message));
        };

        window.logout = () => { if(confirm("Logout karein?")) signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                me = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('app-footer').style.display = 'block';
                document.getElementById('uName').innerText = user.displayName;
                document.getElementById('uImg').innerText = user.displayName.charAt(0);
                startChat();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-header').style.display = 'none';
                document.getElementById('app-footer').style.display = 'none';
            }
        });

        // --- Chat System ---
        function startChat() {
            const chatRef = ref(db, "chats/global");
            document.getElementById('chat-wall').innerHTML = "";

            onChildAdded(chatRef, (snap) => {
                const data = snap.val();
                const isMe = data.uid === me.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `<span class="u-tag">${data.sender}</span>${data.text}`;
                document.getElementById('chat-wall').appendChild(div);
                document.getElementById('chat-wall').scrollTop = document.getElementById('chat-wall').scrollHeight;
            });

            document.getElementById('sendBtn').onclick = sendMessage;
            document.getElementById('msgInp').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

            function sendMessage() {
                const text = document.getElementById('msgInp').value.trim();
                if(!text) return;
                push(chatRef, {
                    sender: me.displayName,
                    uid: me.uid,
                    text: text,
                    time: Date.now()
                });
                document.getElementById('msgInp').value = "";
            }
        }
    </script>
</body>
</html>
